<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XYZ University Portal</title>

    <link rel="stylesheet" href="./style.css" type="text/css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2a5298;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16325c;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>XYZ University</h1>

        <p>
            Create your student account to access lecture notes,
            assignments, coding resources, and course updates.
        </p>

        <form action="/addUser" method="POST" target="_blank" id="signupForm">

            <div class="field">
                <label for="email">Email Address</label>
                <input 
                    type="email"
                    placeholder="student@xyzuniversity.com"
                    name="email"
                    required
                >
            </div>

            <div class="field">
                <label for="username">Full Name</label>
                <input 
                    type="text"
                    placeholder="Jane Doe"
                    name="username"
                    required
                >
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input 
                    type="password"
                    placeholder="Enter secure password"
                    name="password"
                    required
                >
            </div>

            <button id="formBtn">
                Create Student Account
            </button>

        </form>

        <div class="footer">
            © 2026 XYZ University Portal
        </div>

    </div>

</body>
</html>
